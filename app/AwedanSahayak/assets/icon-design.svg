<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- Background: warm orange circle -->
  <rect width="108" height="108" rx="24" fill="#E17055"/>

  <!-- Document/paper (white) -->
  <rect x="18" y="20" width="72" height="78" rx="6" fill="#FFFFFF" opacity="0.95"/>

  <!-- Document lines (text lines on paper) -->
  <rect x="28" y="38" width="38" height="4" rx="2" fill="#E17055" opacity="0.6"/>
  <rect x="28" y="48" width="48" height="3" rx="1.5" fill="#E17055" opacity="0.4"/>
  <rect x="28" y="56" width="42" height="3" rx="1.5" fill="#E17055" opacity="0.35"/>
  <rect x="28" y="64" width="36" height="3" rx="1.5" fill="#E17055" opacity="0.3"/>
  <rect x="28" y="72" width="44" height="3" rx="1.5" fill="#E17055" opacity="0.25"/>
  <rect x="28" y="80" width="30" height="3" rx="1.5" fill="#E17055" opacity="0.2"/>

  <!-- Pen/quill (diagonal, writing on the document) -->
  <g transform="rotate(-40, 78, 28)">
    <rect x="72" y="18" width="6" height="40" rx="3" fill="#FFFFFF"/>
    <polygon points="72,58 78,58 75,68" fill="#FFFFFF"/>
    <rect x="74" y="22" width="2" height="32" rx="1" fill="#E17055" opacity="0.5"/>
  </g>
</svg>
